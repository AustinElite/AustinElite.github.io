name: Sync GitHub repositories

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate repository snapshot
        run: node scripts/sync-github-repos.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USER: AustinElite

      - name: Commit repository snapshot
        run: |
          if git diff --quiet -- assets/data/github-repos.json; then
            echo "No repository changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/github-repos.json
          git commit -m "chore: sync GitHub repositories"
          git push
