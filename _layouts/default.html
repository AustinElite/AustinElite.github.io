<!doctype html>
<html lang="{{ page.lang | default: site.lang }}" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#05070b">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/css/main.css">
    <title>{{ page.title | default: site.title }}</title>
    <script>
      (() => {
        const saved = localStorage.getItem("austinelite-theme");
        document.documentElement.dataset.theme = saved || "dark";
      })();
    </script>
  </head>
  <body data-page="{{ page.page_type | default: 'page' }}">
    {{ content }}
    <script src="/assets/js/main.js"></script>
  </body>
</html>
