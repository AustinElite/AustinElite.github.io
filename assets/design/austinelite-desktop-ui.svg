<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1680" viewBox="0 0 1440 1680" fill="none">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1440" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060606"/>
      <stop offset="0.52" stop-color="#111014"/>
      <stop offset="1" stop-color="#2A1240"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 340) rotate(90) scale(360)">
      <stop offset="0" stop-color="#AF50FF" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#AF50FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#AF50FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="180" y1="0" x2="1260" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101010"/>
      <stop offset="1" stop-color="#151218"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <style>
      .bg { fill: #090909; }
      .panel { fill: #101010; stroke: rgba(247,249,250,.16); stroke-width: 1; }
      .panel-strong { fill: url(#card); stroke: rgba(247,249,250,.2); stroke-width: 1; }
      .white { fill: #F7F9FA; }
      .soft { fill: #B9BEC5; }
      .muted { fill: #777B82; }
      .accent { fill: #AF50FF; }
      .line { stroke: rgba(247,249,250,.18); stroke-width: 1; }
      .line-strong { stroke: rgba(247,249,250,.34); stroke-width: 1; }
      .sans { font-family: "Space Grotesk", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "Cascadia Mono", Consolas, monospace; }
      .serif { font-family: Georgia, "Times New Roman", serif; font-style: italic; }
      .tiny { font-size: 13px; letter-spacing: .03em; }
      .small { font-size: 18px; }
      .body { font-size: 22px; }
      .h2 { font-size: 58px; font-weight: 300; letter-spacing: -.02em; }
      .h1 { font-size: 118px; font-weight: 300; letter-spacing: -.03em; }
      .signature { font-size: 84px; }
    </style>
  </defs>

  <rect width="1440" height="1680" class="bg"/>
  <rect x="0" y="0" width="1440" height="760" fill="url(#hero)"/>
  <rect x="0" y="0" width="1440" height="760" fill="url(#orb)"/>
  <path d="M0 760H1440" class="line"/>

  <g opacity=".22">
    <path d="M0 120H1440M0 240H1440M0 360H1440M0 480H1440M0 600H1440" class="line"/>
    <path d="M180 0V760M360 0V760M540 0V760M720 0V760M900 0V760M1080 0V760M1260 0V760" class="line"/>
  </g>

  <g>
    <rect x="0" y="0" width="1440" height="76" fill="#090909" fill-opacity=".82"/>
    <path d="M0 76H1440" class="line"/>
    <circle cx="96" cy="38" r="5" class="accent"/>
    <text x="116" y="44" class="white sans small" font-weight="700">AUSTINELITE</text>
    <text x="557" y="43" class="soft mono tiny">ABOUT</text>
    <text x="638" y="43" class="soft mono tiny">WORK</text>
    <text x="711" y="43" class="soft mono tiny">SYSTEMS</text>
    <text x="820" y="43" class="soft mono tiny">NOTES</text>
    <text x="900" y="43" class="soft mono tiny">CONTACT</text>
    <rect x="1194" y="21" width="150" height="34" rx="6" stroke="rgba(247,249,250,.34)" fill="rgba(247,249,250,.04)"/>
    <text x="1234" y="43" class="white mono tiny">GITHUB</text>
  </g>

  <g transform="translate(96 160)">
    <text x="0" y="0" class="soft mono tiny">// BACKEND SYSTEMS / APPLIED AI</text>
    <text x="0" y="130" class="white serif signature">Austin</text>
    <text x="0" y="234" class="white sans h1">AUSTINELITE</text>
    <g transform="translate(0 284)">
      <circle cx="5" cy="-5" r="5" class="accent"/>
      <text x="24" y="0" class="white mono tiny">JAVA BACKEND DEVELOPER</text>
      <circle cx="268" cy="-5" r="5" class="accent"/>
      <text x="287" y="0" class="white mono tiny">AI AGENT BUILDER</text>
    </g>
    <text x="0" y="338" class="soft sans body">Reliable backend systems and practical AI products that can</text>
    <text x="0" y="370" class="soft sans body">move from prototype to production.</text>
    <rect x="0" y="420" width="176" height="50" rx="8" fill="#AF50FF"/>
    <text x="40" y="451" class="white sans small">View Work</text>
    <rect x="190" y="420" width="150" height="50" rx="8" stroke="rgba(247,249,250,.34)" fill="rgba(9,9,9,.36)"/>
    <text x="239" y="451" class="white sans small">GitHub</text>
  </g>

  <g transform="translate(940 382)" filter="url(#softShadow)">
    <rect width="330" height="230" rx="8" fill="rgba(9,9,9,.68)" stroke="rgba(247,249,250,.28)"/>
    <circle cx="26" cy="30" r="6" class="accent"/>
    <text x="44" y="35" class="soft mono tiny">NOW / BUILD LOG</text>
    <path d="M24 58H306" stroke="rgba(247,249,250,.18)"/>
    <text x="24" y="92" class="white sans small">Backend + AI Agents</text>
    <text x="24" y="128" class="soft mono tiny">STACK</text>
    <text x="98" y="128" class="white mono tiny">Java / Spring / LLM</text>
    <text x="24" y="162" class="soft mono tiny">MODE</text>
    <text x="98" y="162" class="white mono tiny">China / Remote</text>
    <text x="24" y="196" class="soft mono tiny">FOCUS</text>
    <text x="98" y="196" class="white mono tiny">Production AI</text>
  </g>

  <g transform="translate(96 704)">
    <text x="0" y="0" class="muted mono tiny">CHINA / UTC+08:00</text>
    <text x="776" y="0" class="muted mono tiny">JAVA / DISTRIBUTED SYSTEMS / APPLIED AI</text>
  </g>

  <g transform="translate(96 860)">
    <text x="0" y="0" class="muted mono tiny">01 / ABOUT</text>
    <text x="0" y="82" class="white sans h2">I work where reliable systems</text>
    <text x="0" y="148" class="white sans h2">meet practical intelligence.</text>
    <text x="0" y="210" class="soft sans body">Java services, retrieval systems, LLM workflows and AI Agents, shaped</text>
    <text x="0" y="244" class="soft sans body">into products that are stable, observable and useful in real work.</text>
    <g transform="translate(870 20)">
      <path d="M0 0H360M0 54H360M0 108H360M0 162H360M0 216H360" class="line"/>
      <text x="0" y="35" class="muted mono tiny">DISCIPLINE</text><text x="160" y="35" class="white mono tiny">Backend Architecture</text>
      <text x="0" y="89" class="muted mono tiny">AI</text><text x="160" y="89" class="white mono tiny">RAG / Agents / Tools</text>
      <text x="0" y="143" class="muted mono tiny">DELIVERY</text><text x="160" y="143" class="white mono tiny">Product Automation</text>
      <text x="0" y="197" class="muted mono tiny">MODE</text><text x="160" y="197" class="white mono tiny">China / Remote</text>
    </g>
  </g>

  <g transform="translate(96 1210)">
    <text x="0" y="0" class="muted mono tiny">02 / SELECTED WORK</text>
    <g transform="translate(0 52)">
      <rect width="1248" height="150" rx="8" class="panel-strong"/>
      <text x="32" y="52" class="muted mono tiny">01 / INTELLIGENCE</text>
      <text x="32" y="102" class="white sans h2" font-size="48">ai-market-radar</text>
      <text x="470" y="56" class="soft sans small">AI market intelligence skill, source verification,</text>
      <text x="470" y="86" class="soft sans small">ranking and daily decision-ready briefs.</text>
      <rect x="1034" y="32" width="170" height="86" rx="8" fill="#AF50FF" fill-opacity=".16" stroke="rgba(175,80,255,.42)"/>
      <circle cx="1119" cy="75" r="34" stroke="#AF50FF" stroke-opacity=".72"/>
      <path d="M1119 75L1160 44" stroke="#AF50FF" stroke-width="3"/>
    </g>
    <g transform="translate(0 230)">
      <rect width="1248" height="150" rx="8" class="panel"/>
      <text x="32" y="52" class="muted mono tiny">02 / PRODUCT</text>
      <text x="32" y="102" class="white sans h2" font-size="48">AustinMusic</text>
      <text x="470" y="56" class="soft sans small">AI music player with local library, full-network</text>
      <text x="470" y="86" class="soft sans small">search, lyrics and visual playback effects.</text>
      <rect x="1034" y="32" width="170" height="86" rx="8" fill="#151515" stroke="rgba(247,249,250,.18)"/>
      <path d="M1054 94C1072 42 1088 108 1104 64C1120 20 1136 112 1152 70C1168 30 1182 88 1196 54" stroke="#F7F9FA" stroke-width="4"/>
    </g>
    <g transform="translate(0 408)">
      <rect width="1248" height="150" rx="8" class="panel"/>
      <text x="32" y="52" class="muted mono tiny">03 / EXPERIENCE</text>
      <text x="32" y="102" class="white sans h2" font-size="48">study-haven-web</text>
      <text x="470" y="56" class="soft sans small">Static immersive study room with focus timer,</text>
      <text x="470" y="86" class="soft sans small">ambience, daily plan and local state.</text>
      <rect x="1034" y="32" width="170" height="86" rx="8" fill="#F7F9FA"/>
      <circle cx="1072" cy="75" r="18" fill="#090909"/>
      <rect x="1110" y="58" width="66" height="8" rx="4" fill="#090909"/>
      <rect x="1110" y="78" width="88" height="8" rx="4" fill="#777B82"/>
    </g>
  </g>
</svg>
